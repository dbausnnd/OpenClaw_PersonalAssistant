services:
  couchdb:
    image: couchdb:3.3
    container_name: couchdb-livesync
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    ports:
      - "127.0.0.1:5984:5984"
    volumes:
      - ${COUCHDB_DATA}:/opt/couchdb/data
